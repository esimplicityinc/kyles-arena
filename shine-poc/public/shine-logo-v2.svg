<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Glow filter for nodes -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Gradient for top face (brightest) -->
    <linearGradient id="topFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6B2D8B" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#6B2D8B" stop-opacity="0.15"/>
    </linearGradient>
    
    <!-- Gradient for left face (medium) -->
    <linearGradient id="leftFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6B2D8B" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6B2D8B" stop-opacity="0.20"/>
    </linearGradient>
    
    <!-- Gradient for right face (darkest) -->
    <linearGradient id="rightFace" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6B2D8B" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6B2D8B" stop-opacity="0.25"/>
    </linearGradient>
  </defs>
  
  <!-- Purple backdrop for visibility on light backgrounds -->
  <circle cx="50" cy="45" r="42" fill="#6B2D8B" opacity="0.15"/>
  
  <!-- 
    VERSION 2: Gradient shaded faces
    Three visible faces of the isometric cube with gradient fills
  -->
  
  <!-- FACES - Gradient filled polygons -->
  <g id="faces">
    <!-- Top face (top, upper-left, center-front, upper-right) -->
    <polygon points="50,10 23,25.5 50,41 77,25.5" fill="url(#topFace)"/>
    
    <!-- Left face (center-front, upper-left, middle-left, center-back) -->
    <polygon points="50,41 23,25.5 23,56.5 50,72" fill="url(#leftFace)"/>
    
    <!-- Right face (center-front, upper-right, middle-right, center-back) -->
    <polygon points="50,41 77,25.5 77,56.5 50,72" fill="url(#rightFace)"/>
  </g>
  
  <!-- EDGES - Isometric cube structure -->
  <g id="edges" stroke="#FFFFFF" fill="none">
    <!-- Top pyramid edges -->
    <line x1="50" y1="10" x2="23" y2="25.5" stroke-width="2" opacity="0.85"/>
    <line x1="50" y1="10" x2="77" y2="25.5" stroke-width="2" opacity="0.85"/>
    <line x1="50" y1="10" x2="50" y2="41" stroke-width="2" opacity="0.9"/>
    
    <!-- Upper horizontal connections -->
    <line x1="23" y1="25.5" x2="50" y2="41" stroke-width="2" opacity="0.8"/>
    <line x1="77" y1="25.5" x2="50" y2="41" stroke-width="2" opacity="0.8"/>
    
    <!-- Vertical edges (left and right sides) -->
    <line x1="23" y1="25.5" x2="23" y2="56.5" stroke-width="2" opacity="0.7"/>
    <line x1="77" y1="25.5" x2="77" y2="56.5" stroke-width="2" opacity="0.7"/>
    
    <!-- Middle cross connections -->
    <line x1="50" y1="41" x2="23" y2="56.5" stroke-width="2" opacity="0.85"/>
    <line x1="50" y1="41" x2="77" y2="56.5" stroke-width="2" opacity="0.85"/>
    <line x1="50" y1="41" x2="50" y2="72" stroke-width="2" opacity="0.8"/>
    
    <!-- Bottom horizontal connections -->
    <line x1="23" y1="56.5" x2="50" y2="72" stroke-width="2" opacity="0.75"/>
    <line x1="77" y1="56.5" x2="50" y2="72" stroke-width="2" opacity="0.75"/>
  </g>
  
  <!-- NODES - 7 vertices with glow -->
  <g id="nodes">
    <!-- Top vertex -->
    <circle cx="50" cy="10" r="4" fill="#FFFFFF" opacity="0.95" filter="url(#glow)"/>
    
    <!-- Upper left and right -->
    <circle cx="23" cy="25.5" r="3.5" fill="#FFFFFF" opacity="0.85" filter="url(#glow)"/>
    <circle cx="77" cy="25.5" r="3.5" fill="#FFFFFF" opacity="0.85" filter="url(#glow)"/>
    
    <!-- Center front (prominent) -->
    <circle cx="50" cy="41" r="5" fill="#FFFFFF" opacity="1" filter="url(#glow)"/>
    
    <!-- Middle left and right -->
    <circle cx="23" cy="56.5" r="3.5" fill="#FFFFFF" opacity="0.8" filter="url(#glow)"/>
    <circle cx="77" cy="56.5" r="3.5" fill="#FFFFFF" opacity="0.8" filter="url(#glow)"/>
    
    <!-- Center back -->
    <circle cx="50" cy="72" r="4" fill="#FFFFFF" opacity="0.85" filter="url(#glow)"/>
  </g>
</svg>
