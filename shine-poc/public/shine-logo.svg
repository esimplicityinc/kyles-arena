<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Strong glow filter for front nodes -->
    <filter id="glowStrong" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Soft glow filter for back nodes -->
    <filter id="glowSoft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Drop shadow filter -->
    <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="3" dy="4" stdDeviation="3" flood-color="#1a0a20" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Purple backdrop for visibility on light backgrounds -->
  <circle cx="50" cy="45" r="42" fill="#6B2D8B" opacity="0.15"/>
  
  <!-- 
    VERSION 3: Shadow/glow depth effect
    - Drop shadow beneath the structure
    - Stronger glow on front-facing dots
    - Softer glow on back dots
  -->
  
  <!-- Shadow layer (offset down-right) -->
  <g id="shadow" filter="url(#dropShadow)" opacity="0.5">
    <!-- Simplified shadow shape -->
    <polygon points="50,10 23,25.5 23,56.5 50,72 77,56.5 77,25.5" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  </g>
  
  <!-- EDGES - Isometric cube structure -->
  <g id="edges" stroke="#FFFFFF" fill="none">
    <!-- Top pyramid edges -->
    <line x1="50" y1="10" x2="23" y2="25.5" stroke-width="1.8" opacity="0.7"/>
    <line x1="50" y1="10" x2="77" y2="25.5" stroke-width="1.8" opacity="0.7"/>
    <line x1="50" y1="10" x2="50" y2="41" stroke-width="2" opacity="0.9"/>
    
    <!-- Upper horizontal connections -->
    <line x1="23" y1="25.5" x2="50" y2="41" stroke-width="1.8" opacity="0.65"/>
    <line x1="77" y1="25.5" x2="50" y2="41" stroke-width="1.8" opacity="0.65"/>
    
    <!-- Vertical edges (left and right sides) -->
    <line x1="23" y1="25.5" x2="23" y2="56.5" stroke-width="1.5" opacity="0.5"/>
    <line x1="77" y1="25.5" x2="77" y2="56.5" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Middle cross connections -->
    <line x1="50" y1="41" x2="23" y2="56.5" stroke-width="2" opacity="0.8"/>
    <line x1="50" y1="41" x2="77" y2="56.5" stroke-width="2" opacity="0.8"/>
    <line x1="50" y1="41" x2="50" y2="72" stroke-width="1.8" opacity="0.7"/>
    
    <!-- Bottom horizontal connections -->
    <line x1="23" y1="56.5" x2="50" y2="72" stroke-width="1.8" opacity="0.6"/>
    <line x1="77" y1="56.5" x2="50" y2="72" stroke-width="1.8" opacity="0.6"/>
  </g>
  
  <!-- NODES - Back vertices with soft glow -->
  <g id="nodes-back">
    <!-- Upper left and right (back) -->
    <circle cx="23" cy="25.5" r="3" fill="#FFFFFF" opacity="0.6" filter="url(#glowSoft)"/>
    <circle cx="77" cy="25.5" r="3" fill="#FFFFFF" opacity="0.6" filter="url(#glowSoft)"/>
    
    <!-- Center back -->
    <circle cx="50" cy="72" r="3.5" fill="#FFFFFF" opacity="0.65" filter="url(#glowSoft)"/>
  </g>
  
  <!-- NODES - Front vertices with strong glow -->
  <g id="nodes-front">
    <!-- Top vertex (front) -->
    <circle cx="50" cy="10" r="4.5" fill="#FFFFFF" opacity="1" filter="url(#glowStrong)"/>
    
    <!-- Center front (most prominent) -->
    <circle cx="50" cy="41" r="5.5" fill="#FFFFFF" opacity="1" filter="url(#glowStrong)"/>
    
    <!-- Middle left and right (front) -->
    <circle cx="23" cy="56.5" r="4" fill="#FFFFFF" opacity="0.95" filter="url(#glowStrong)"/>
    <circle cx="77" cy="56.5" r="4" fill="#FFFFFF" opacity="0.95" filter="url(#glowStrong)"/>
  </g>
</svg>
