name: RIC Weekly Report – Generate & Deploy

# ============================================================
# Triggers
# ============================================================
on:
  schedule:
    # Every Monday at 9 AM ET (14:00 UTC)
    - cron: '0 14 * * 1'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger (optional)'
        required: false
        default: 'Manual run'

# ============================================================
# Concurrency – cancel any in-progress deploy when a new run
# starts so we don't queue up stale builds.
# ============================================================
concurrency:
  group: ric-weekly-report
  cancel-in-progress: true

# ============================================================
# Jobs
# ============================================================
jobs:

  # ----------------------------------------------------------
  # Job 1 – Generate the weekly report and commit it
  # ----------------------------------------------------------
  generate:
    name: Generate Report
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the commit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history so the commit push works cleanly

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate RIC weekly report
        run: python ric-reports/generate_report.py
        env:
          JIRA_URL:        https://esimplicity.atlassian.net
          JIRA_EMAIL:      ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN:  ${{ secrets.JIRA_API_TOKEN }}

      - name: Commit and push report files
        run: |
          git config user.name  "RIC Report Bot"
          git config user.email "ric-bot@esimplicity.com"
          git add ric-reports/
          git diff --staged --quiet || git commit -m "chore: auto-generate RIC weekly report $(date +%Y-%m-%d)"
          git push

  # ----------------------------------------------------------
  # Job 2 – Build the static site into _site/
  # ----------------------------------------------------------
  build:
    name: Build Site
    runs-on: ubuntu-latest
    needs: generate
    permissions:
      contents: read

    steps:
      - name: Checkout repository (with generated report)
        uses: actions/checkout@v4
        with:
          # Pull the commit that was just pushed by the generate job
          ref: ${{ github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build NTIA Spectrum Simulation
        working-directory: ntia-spectrum-simulation
        run: |
          npm ci
          npm run build

      - name: Prepare deployment directory
        run: |
          mkdir -p _site
          # Copy static sites
          cp -r esim-databricks-day _site/
          # Copy Vite build output
          cp -r ntia-spectrum-simulation/dist _site/ntia-spectrum-simulation
          # Copy RIC Reports site (now includes freshly-generated report)
          cp -r ric-reports _site/ric-reports

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  # ----------------------------------------------------------
  # Job 3 – Deploy to GitHub Pages
  # ----------------------------------------------------------
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages:     write
      id-token:  write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
