name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build NTIA Spectrum Simulation
        working-directory: ntia-spectrum-simulation
        run: |
          npm ci
          npm run build

      - name: Prepare deployment
        run: |
          mkdir -p _site
          # Copy static sites
          cp -r esim-databricks-day _site/
          # Copy Vite build output
          cp -r ntia-spectrum-simulation/dist _site/ntia-spectrum-simulation

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
